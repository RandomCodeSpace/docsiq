name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  security-events: write
  id-token: write
  actions: read

jobs:
  pipeline:
    uses: RandomCodeSpace/central-ops/.github/workflows/reusable-pipeline.yml@main
    secrets: inherit
    with:
      go_version_file: go.mod
      working_directory: .
      cgo_enabled: "0"
      go_test_flags: "-timeout 120s"
