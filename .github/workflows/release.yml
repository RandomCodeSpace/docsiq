name: release

# Manually-triggered stable release via goreleaser. Pick bump
# (patch/minor/major); the next vX.Y.Z tag is computed from the
# latest stable tag.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (patch/minor/major)"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions: read-all

concurrency:
  group: release-manual
  cancel-in-progress: false

jobs:
  tag:
    name: compute next tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Compute next stable tag
        id: ver
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -eu
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          ver="${latest#v}"
          major="${ver%%.*}"
          rest="${ver#*.}"
          minor="${rest%%.*}"
          patch="${rest##*.}"
          case "$BUMP" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
            *) echo "unknown bump: $BUMP" >&2; exit 1 ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next tag: $next (from $latest, bump=$BUMP)"

  ui:
    name: build ui
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - run: npm --prefix ui ci
      - run: npm --prefix ui run build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ui-dist
          path: ui/dist
          retention-days: 1
          if-no-files-found: error

  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: [tag, ui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      CGO_ENABLED: "1"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ui-dist
          path: ui/dist

      - name: Build binary
        run: |
          set -eu
          tag="${{ needs.tag.outputs.tag }}"
          sha="${{ github.sha }}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          pkg="github.com/RandomCodeSpace/docsiq/cmd"
          ldflags="-s -w -X ${pkg}.Version=${tag} -X ${pkg}.Commit=${sha} -X ${pkg}.Date=${date}"
          go build -tags sqlite_fts5 -trimpath -ldflags="${ldflags}" -o docsiq ./

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: docsiq
          retention-days: 1
          if-no-files-found: error

  release:
    name: goreleaser
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write       # cosign keyless
      attestations: write   # SLSA provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          # v2.x — v3 broke our sign-blob flag compatibility.
          cosign-release: 'v2.6.3'

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: binary-*
          path: downloaded/

      - name: Lay out prebuilt/ for goreleaser
        run: |
          set -eu
          mkdir -p prebuilt
          for dir in downloaded/binary-*; do
            rest=$(basename "$dir" | sed 's/^binary-//')
            goos="${rest%-*}"
            goarch="${rest##*-}"
            target_dir="prebuilt/docsiq_${goos}_${goarch}"
            mkdir -p "$target_dir"
            cp "$dir/docsiq" "$target_dir/docsiq"
            chmod +x "$target_dir/docsiq"
          done
          ls -R prebuilt/

      - name: Create + push tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          tag="${{ needs.tag.outputs.tag }}"
          git tag "$tag"
          git push origin "$tag"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser
          version: 'v2.15.4'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ needs.tag.outputs.tag }}

      - name: Generate SLSA build provenance
        id: attest
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/docsiq-*-linux-amd64
            dist/docsiq-*-darwin-arm64
            dist/SHA256SUMS

      - name: Upload provenance to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          tag="${{ needs.tag.outputs.tag }}"
          cp "${{ steps.attest.outputs.bundle-path }}" "docsiq-${tag}.intoto.jsonl"
          gh release upload "$tag" "docsiq-${tag}.intoto.jsonl"
