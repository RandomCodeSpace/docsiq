data_dir: ~/.docsiq/data   # per-project DBs live at $data_dir/projects/<slug>/docsiq.db

llm:
  provider: ollama             # azure | ollama

  azure:
    # Shared defaults — used when chat/embed-specific values are not set.
    endpoint: https://myresource.openai.azure.com
    api_key: ${AZURE_OPENAI_API_KEY}
    api_version: "2024-08-01"

    chat:
      model: gpt-4o
      # endpoint: ...            # optional: override shared endpoint
      # api_key: ...             # optional: override shared key
      # api_version: ...         # optional: override shared version

    embed:
      model: text-embedding-3-small
      # endpoint: ...            # optional: separate deployment for embeddings
      # api_key: ...             # optional: separate key for embeddings
      # api_version: ...         # optional: separate version for embeddings

  ollama:
    base_url: http://localhost:11434
    chat_model: llama3.2
    embed_model: nomic-embed-text

indexing:
  chunk_size: 512
  chunk_overlap: 50
  batch_size: 20
  workers: 4
  extract_graph: true
  extract_claims: true
  max_gleanings: 1             # gleaning passes for entity extraction (0=single pass)

community:
  min_community_size: 2
  max_levels: 3

server:
  host: 127.0.0.1
  port: 8080
